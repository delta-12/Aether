name: Continuous Deployment Workflow

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    permissions:
      contents: read
      pull-requests: write
      checks: write
    uses: ./.github/workflows/ci.yml
    secrets:
      SONARCLOUD_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}
  release:
    runs-on: ubuntu-latest
    needs: ci
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      tag: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: Aether-Release
          path: ./Aether-Release
      - name: Create pre-release
        if: ${{ contains(github.ref_name, '-') }}
        run: |
          gh release create "$tag" ./Aether-Release/* \
              --title="${tag#v}" \
              --generate-notes \
              --latest=false \
              --prerelease
      - name: Create release
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          gh release create "$tag" ./Aether-Release/* \
              --title="${tag#v}" \
              --generate-notes \
              --latest=true
